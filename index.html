<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Travel Bloom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="travel_recommendation.css">
</head>

<body>
    <div class="navbar">
        <div class="logo">
            <img src="logo.png" alt="TravelBloom">
            TravelBloom
        </div>

        <div class="nav-links">
            <a href="./travel_recommendation.html" id="home">Home</a>
            <a href="./about_us.html" id="aboutUs">About Us</a>
            <a href="./contact_us.html" id="contactUs">Contact Us</a>
        </div>

        <div class="search-container">
            <input type="text" placeholder="Enter a destination or keyword" id="searchInput">
            <button class="search-btn" id="searchBtn">Search</button>
            <button class="clear-btn" id="clearBtn">Clear</button>
        </div>
    </div>

    <div class="social-bar">
        <div class="line"></div>

        <a href="https://twitter.com" target="_blank" aria-label="Twitter">
            <i class="fab fa-twitter"></i>
        </a>

        <a href="https://facebook.com" target="_blank" aria-label="Facebook">
            <i class="fab fa-facebook-f"></i>
        </a>

        <a href="https://instagram.com" target="_blank" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="https://youtube.com" target="_blank" aria-label="YouTube">
            <i class="fab fa-youtube"></i>
        </a>
    </div>

    <section id="intro">
        <h1>
            EXPLORE <br>
            DREAM <br>
            DESTINATION <br>
        </h1>
        <p>
            It encourages exploration of unfamiliar <br>
            territories, embracing diverse cultures and <br>
            landscapes, while pursuing the desired <br>
            destination that captivates the heart and <br>
            ignites a sense of wonder <br>
        </p>
        <button id="btnBookNow">BOOK NOW</button>
    </section>
    <div id="recommendations"></div>

    <script src="travel_recommendation.js"></script>
</body>

</html>
