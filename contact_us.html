<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TravelBloom - Contact Us</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="travel_recommendation.css">
</head>

<body>
    <div class="navbar">
        <div class="logo">
            <img src="logo.png" alt="TravelBloom">
            TravelBloom
        </div>

        <div class="nav-links">
            <a href="./index.html" id="home">Home</a>
            <a href="./about_us.html" id="aboutUs">About Us</a>
            <a href="./contact_us.html" id="contactUs">Contact Us</a>
        </div>

        <div class="search-container">
            <input type="text" placeholder="Enter a destination or keyword">
            <button class="search-btn">Search</button>
            <button class="clear-btn">Clear</button>
        </div>
    </div>

    <div class="social-bar">
        <div class="line"></div>

        <a href="https://twitter.com" target="_blank" aria-label="Twitter">
            <i class="fab fa-twitter"></i>
        </a>

        <a href="https://facebook.com" target="_blank" aria-label="Facebook">
            <i class="fab fa-facebook-f"></i>
        </a>

        <a href="https://instagram.com" target="_blank" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="https://youtube.com" target="_blank" aria-label="YouTube">
            <i class="fab fa-youtube"></i>
        </a>    
    </div>

    <div class="contactUs">
        <div class="headingCU">
            <br><br><br><br>
            <h1>CONTACT US</h1>
        </div>
        <div class="contactForm">
            Name<br>
            <input type="text" placeholder="Enter Your name"><br>
            Email<br>
            <input type="email" placeholder="Enter your email"><br>
            Message<br>
            <input type="textblock" placeholder="Enter your message"><br>
            <button>Submit</button>
        </div>
    </div>

</body>


</html>
